<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI 剧本创作工具{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="/" class="nav-brand">AI 剧本创作工具</a>
            {% if project_count is defined and project_count > 0 %}
            <span class="nav-count">
                {% if project_index is defined %}
                项目 {{ project_index }}/{{ project_count }}
                {% else %}
                共 {{ project_count }} 个项目
                {% endif %}
            </span>
            {% endif %}
        </div>
        <a href="/projects/new" class="nav-link">新建项目</a>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script>
    // Cancel any pending shutdown on page load
    fetch('/health').catch(function(){});

    // Request shutdown when page closes
    window.addEventListener('beforeunload', function() {
        navigator.sendBeacon('/api/shutdown');
    });
    </script>
</body>
</html>
