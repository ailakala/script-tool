<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 44" width="220" height="44">
  <defs>
    <linearGradient id="clap-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="40%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="ai-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <filter id="sparkle">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>

  <!-- 🎬 Clapperboard icon -->
  <g transform="translate(2,4)">
    <!-- Board body -->
    <rect x="0" y="0" width="32" height="22" rx="2" fill="#1a1a2e" stroke="url(#clap-grad)" stroke-width="1.5"/>
    <!-- Top bar (clapper stick) -->
    <rect x="0" y="-4" width="32" height="5" rx="1" fill="url(#clap-grad)" opacity="0.9"/>
    <!-- Diagonal stripes on top bar -->
    <line x1="8" y1="-4" x2="4" y2="1" stroke="#1a1a2e" stroke-width="0.8" opacity="0.5"/>
    <line x1="16" y1="-4" x2="12" y2="1" stroke="#1a1a2e" stroke-width="0.8" opacity="0.5"/>
    <line x1="24" y1="-4" x2="20" y2="1" stroke="#1a1a2e" stroke-width="0.8" opacity="0.5"/>
    <line x1="32" y1="-4" x2="28" y2="1" stroke="#1a1a2e" stroke-width="0.8" opacity="0.5"/>
    <!-- Scene & Take text -->
    <text x="16" y="11" text-anchor="middle" font-family="monospace" font-size="5" fill="url(#clap-grad)" font-weight="bold">SCENE</text>
    <text x="16" y="18" text-anchor="middle" font-family="monospace" font-size="4.5" fill="#a0a0b8">TAKE 1</text>
    <!-- Sparkle -->
    <circle cx="30" cy="2" r="1.5" fill="#fbbf24" filter="url(#sparkle)" opacity="0.8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Main text -->
  <text x="42" y="16" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="800" fill="url(#text-grad)" letter-spacing="0.5">剧本创作工具</text>

  <!-- AI badge -->
  <rect x="42" y="22" width="26" height="14" rx="7" fill="url(#ai-grad)" opacity="0.25"/>
  <text x="55" y="32" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="700" fill="url(#ai-grad)">AI</text>

  <!-- Subtitle -->
  <text x="74" y="32" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="8" fill="#a0a0b8" font-weight="500">Powered by AI · 一键生成标准剧本</text>

  <!-- Decorative dots -->
  <circle cx="190" cy="10" r="1.2" fill="#f59e0b" opacity="0.4"/>
  <circle cx="196" cy="16" r="0.8" fill="#fbbf24" opacity="0.3"/>
  <circle cx="202" cy="8" r="0.6" fill="#f97316" opacity="0.3"/>
</svg>
